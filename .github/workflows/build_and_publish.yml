name: Build and upload to PyPI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master
      - develop
jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # macos-13 is an intel runner, macos-14 is apple silicon
        os: [ubuntu-latest, windows-latest, macos-13, macos-14]

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.20.0
        with:
          package-dir: ./accelerate

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        run: pipx run build --sdist

      - name: Build accelerate sdist
        run: pipx run build --sdist
        working-directory: ./

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-sdist-root
          path: dist/*.tar.gz

  build_sdist_accel:
    name: Build accelerate source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        run: pipx run build --sdist

      - name: Build accelerate sdist
        run: pipx run build --sdist
        working-directory: ./accelerate/

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-sdist-accel
          path: dist/*.tar.gz

  upload_pypi_test:
    needs: [build_wheels, build_sdist, build_sdist_accel]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    # only push to pypi if we are pushing to master
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/develop')
    steps:
      - uses: actions/download-artifact@v4
        with:
          # unpacks all CIBW artifacts into dist/
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  upload_pypi:
    needs: [build_wheels, build_sdist, build_sdist_accel]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    # only push to pypi if we are pushing a tag with version prefix
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/version')
    steps:
      - uses: actions/download-artifact@v4
        with:
          # unpacks all CIBW artifacts into dist/
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
        # with:
        #   repository-url: https://test.pypi.org/legacy/
